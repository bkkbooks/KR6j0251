body:
  text: 唐天后代佛授記寺翻經沙門慧智奉制譯菩薩號為觀世音神通無礙難可量搖山竭海震大地悲愍衆生同一體記憶名號福不虛是故常應稱念彼我今至誠念彼德以是敬心而讚歎菩薩智慧深如海方便善權無能測所有諸天阿修羅摩睺羅伽及人衆咸以微妙清淨偈歷劫讚之無懈倦我今宣說春陽頌述其功德之少分世間形色尊嚴者諸天莫踰於梵王況聖自在本色身百千萬分不及一尊者首飾甚嚴好冠以曼陀及金花虹霓美麗以莊嚴復如半月映山王又似百寶成須彌尊者身相甚微妙猶如輕雨籠寶嶽伊尼鹿彩覆其肩光明晃朗普周遍巍巍挺特若金山亦如滿月處虛空又似薝波迦花色勝彼摩醯首羅身徒以白龍為瓔珞右手執持金蓮花毗琉璃寶以為莖以慈開敷極香潔令諸智者生愛樂尊手所持勝淨花莊嚴殊妙甚暉麗如月光曜須彌頂聖身所處蓮花臺由尊福德之所感我以至誠殷重心歸命敬禮賜願者諸天供養所讚歎我今淨心歸命禮尊者螺髻玄蜂色牟尼妙像處其中光明映曜嚴尊首如燒珊瑚流電色又如雌黃耀黑山上下莊嚴大聖身冒敢為文稱歎彼四面狂象利牙齒若人居中將被害其人專心念菩薩捨離苦惱而無畏暴龍哮吼放烟毒嘊喍瞋怒厲惡色將噬其人甚可怖憶念觀音便解脫海潮風浪出音聲摩竭巨魚皆震激若人船破誤落中念彼觀音獲安隱高山嶮谷懸巖裏奔流濺石衆難處若人墮中無救護心念觀音登彼岸烈火猛焰惡風起延燒屋宅焚及人至心念彼功德藏應時災火不為害若人繫縛在牢獄身嬰枷鎖及杻械至心稱念觀音故其人須臾便解脫若人墮落大火坑專志稱名觀世音其人除熱得清淨猶若池中華開敷若人經於大林中忽遇雷電驟風雨霹靂將燒極危殆稱念觀音免災難若人逢值猛師子牙爪銛利如刀劍瞋目吼喚來食人稱念觀音便免害惡賊突厥彌戾車凶險無慈若羅剎復以鐵鎖繫縛人稱名發念皆解脫深山大澤險難處劫賊伺人將抄奪稱名念力願救護其人釋然無患苦呪呾讒訟擬中傷恆以惡心求方便由彼常念觀音故其人竟不能為害鬪戰旗鼓兩相當鋒鏑交橫競殘刃此時心念及稱名菩薩於中施無畏大力惡鬼執捉人鳩槃荼等飲人髓若能繫念觀音者擁護其人銷疫難鬼病熱病腹脹病疳病黃病心痛病癩病癲病霍亂病血氣羸瘦種種病諸惡黑業纏其身稱名繫念皆除愈有諸餓鬼腹如山脣口乾焦飢渴惱菩薩見之生慈悲次第令其得充足餓鬼或遭寒凍逼身體皮肉皆破壞舉彼兩手生極苦神通方便令熅適若金翅鳥以嘴爪搏撮水陸諸龍等其龍專心念菩薩即得離苦獲安樂若有欲求勝果報象馬車乘及奴婢衣服飲食諸珍寶由彼常念觀音故應其求願自然至若有欲得長生術坐臥雲間恣空行由彼常念觀音故當獲神呪及仙藥我見壁畫觀音像遍視色相諸功德及見神通大自在故起至誠而讚歎所有一切諸功德於菩薩中最第一無邊善巧大方便示現清淨妙色身遠離有無諸分別利益無量如虛空以此讚歎功德藏願證如來一切智以此讚歎觀世音菩薩功德上資國主聖神皇帝陛下善轉金輪色力壽命永無窮盡智慧果報不可思議恆御閻浮長居震旦擁護三寶利益群生一切含靈皆蒙聖福
